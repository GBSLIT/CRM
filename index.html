<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>GBSL CRM</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<script src="https://alcdn.msauth.net/browser/2.37.0/js/msal-browser.min.js"></script>

<style>

body{
font-family:Inter,system-ui;
margin:0;
background:#f5f7fb;
}

.sidebar{
width:220px;
height:100vh;
background:#fff;
border-right:1px solid #eee;
padding:20px;
position:fixed;
}

.main{
margin-left:220px;
padding:30px;
}

.nav button{
display:block;
width:100%;
padding:10px;
border:none;
background:none;
text-align:left;
cursor:pointer;
border-radius:8px;
}

.nav button:hover{
background:#f2f4f8;
}

.btn{
background:#2563eb;
color:#fff;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const CLIENT_ID = "PASTE_CLIENT_ID_HERE";
const TENANT_ID = "PASTE_TENANT_ID_HERE";

const REDIRECT_URI = "https://gbslit.github.io/CRM/";

const SCOPES = ["User.Read","Files.Read.All","Sites.Read.All"];

const msalConfig = {
auth:{
clientId:CLIENT_ID,
authority:`https://login.microsoftonline.com/${TENANT_ID}`,
redirectUri:REDIRECT_URI
},
cache:{
cacheLocation:"localStorage"
}
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

function Login({onLogin}){

return(
<div style={{
height:"100vh",
display:"flex",
alignItems:"center",
justifyContent:"center"
}}>
<div style={{
background:"#fff",
padding:40,
borderRadius:12,
boxShadow:"0 10px 30px rgba(0,0,0,0.08)"
}}>

<h2>GBSL CRM Login</h2>

<button className="btn" onClick={onLogin}>
Sign in with Microsoft
</button>

</div>
</div>
);

}

function Sidebar({tab,setTab}){

const tabs=[
"Dashboard",
"Contacts",
"Deals",
"Activities",
"Tasks",
"Campaigns",
"Reports"
];

return(

<div className="sidebar">

<h3>GBSL CRM</h3>

<div className="nav">

{tabs.map(t=>(

<button
key={t}
onClick={()=>setTab(t)}
>
{t}
</button>

))}

</div>

</div>

);

}

function App(){

const [user,setUser]=React.useState(null);
const [tab,setTab]=React.useState("Dashboard");

async function login(){

const response=await msalInstance.loginPopup({
scopes:SCOPES
});

const account=response.account;

setUser({
email:account.username,
name:account.name
});

}

if(!user){
return <Login onLogin={login}/>
}

return(

<div>

<Sidebar tab={tab} setTab={setTab}/>

<div className="main">

<h2>{tab}</h2>

<p>Welcome {user.name}</p>

</div>

</div>

);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
